<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0078D7;
            --dark: #1a1a1a;
            --accent: #00c853;
            --bg-light: #f4f7f9;
        }

        body { font-family: 'Inter', sans-serif; margin:0; background: var(--bg-light); color: #333; line-height: 1.6; }

        /* NAGŁÓWEK HERO - POPRAWIONY DLA WIDOCZNOŚCI DETALI */
        header {
            background: linear-gradient(rgba(0, 30, 60, 0.75), rgba(0, 30, 60, 0.85)), url('serwis-bg.jpg');
            background-size: cover;
            /* Pozycjonowanie na dół, aby nie ucinało baterii */
            background-position: center bottom; 
            background-attachment: fixed;
            color: white;
            text-align: center;
            /* Zwiększony padding, aby odsłonić więcej zdjęcia */
            padding: 160px 20px 140px; 
        }

        .header-content { max-width: 900px; margin: auto; }
        header h1 { font-size: 3em; margin-bottom: 20px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        header p { font-size: 1.3em; opacity: 1; margin-bottom: 35px; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }

        /* PRZYCISKI */
        .btn-container { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .call-btn, .shop-btn {
            padding: 18px 35px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1.1em;
            display: flex;
            align-items: center;
        }
        .call-btn { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(0,200,83,0.4); }
        .shop-btn { background: white; color: var(--dark); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .call-btn:hover, .shop-btn:hover { transform: translateY(-3px); }

        /* BRANDS BAR - KAFELKI */
        .brands-section { background: white; padding: 40px 20px; border-bottom: 1px solid #eee; }
        .brands-grid { 
            max-width: 1100px; 
            margin: auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 20px; 
            align-items: center;
        }
        .brand-tile {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .brand-tile:hover { border-color: var(--primary); color: var(--primary); background: #f9f9f9; }

        /* SEKCJE */
        section { max-width: 1100px; margin: auto; padding: 70px 20px; }
        h2 { text-align: center; color: var(--dark); margin-bottom: 40px; font-size: 2.2em; }
        h2::after { content: ''; display: block; width: 60px; height: 4px; background: var(--primary); margin: 15px auto; }

        .why-me { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .why-item { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .why-icon { font-size: 45px; margin-bottom: 15px; display: block; }

        /* USŁUGI */
        .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .card h3 { color: var(--primary); margin-top: 0; font-size: 1.4em; }
        .card ul { padding-left: 20px; }
        .card ul li { margin-bottom: 8px; }

        /* REVIEWS */
        .review { background: #fff; padding: 30px; border-radius: 15px; border-left: 6px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 25px; font-style: italic; }

        /* MAPA */
        .map-wrapper { width: 100%; height: 450px; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .map-wrapper iframe { width: 100%; height: 100%; border: 0; }

        /* FOOTER & STICKY */
        footer { background: var(--dark); color: white; text-align: center; padding: 50px 20px; }
        #sticky-call { position: fixed; bottom: 25px; left: 25px; background: var(--accent); color: white; padding: 16px 28px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 9999; }

        @media (max-width: 768px) {
            header { padding: 100px 20px 80px; background-attachment: scroll; }
            header h1 { font-size: 1.8em; }
            header p { font-size: 1.1em; }
            .call-btn, .shop-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
