<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Serwis Hansgrohe Kraków | Naprawa, Montaż, Geberit, Grohe</title>
<meta name="description" content="Serwis Hansgrohe Kraków – naprawa, montaż, części. Sprawdź opinie klientów i umów wizytę.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; margin:0; background:#f7f8fa; }

header {
    background: linear-gradient(135deg, #0078D7, #005ea1);
    color:white;
    text-align:center;
    padding:60px 20px 30px;
}

.hero-btn, .call-btn, .shop-btn, .fb-btn {
    display:inline-block;
    margin-top:20px;
    padding:15px 30px;
    border-radius:30px;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
}

.hero-btn { background:white; color:#0078D7; }
.call-btn { background:#00c853; color:white; }
.shop-btn { background:#ff9800; color:white; }
.fb-btn { background:#1877f2; color:white; }

.hero-btn:hover, .call-btn:hover, .shop-btn:hover, .fb-btn:hover {
    transform:scale(1.05);
}

section { max-width:1100px; margin:auto; padding:60px 20px; }
h2 { text-align:center; color:#0078D7; }

.services {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* OPINIE */
.reviews-box {
    text-align:center;
}

.fb-review-btn {
    display:inline-block;
    margin:20px 0;
    padding:15px 25px;
    background:#1877f2;
    color:white;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.fb-review-btn:hover {
    transform:scale(1.05);
}

/* sticky */
#sticky-call, #sticky-contact, #sticky-shop, #sticky-fb {
    position:fixed;
    right:20px;
    padding:15px 20px;
    border-radius:50px;
    color:white;
    text-decoration:none;
}

#sticky-call { bottom:20px; left:20px; background:#00c853; }
#sticky-contact { bottom:20px; right:20px; background:#0078D7; }
#sticky-shop { bottom:80px; right:20px; background:#ff9800; }
#sticky-fb { bottom:140px; right:20px; background:#1877f2; }
</style>
</head>

<body>

<header>
<h1>Serwis Hansgrohe Kraków</h1>
<p>Naprawa • Montaż • Geberit • Grohe</p>

<a href="#kontakt" class="hero-btn">Formularz</a>
<a href="tel:+48660469203" class="call-btn">📞 Zadzwoń</a>
<a href="http://www.springspa.pl" target="_blank" class="shop-btn">🛒 Sklep</a>
<a href="https://www.facebook.com/profile.php?id=61570691483438" target="_blank" class="fb-btn">📘 Facebook</a>
</header>

<section>
<h2>Nasze usługi</h2>
<div class="services">
<div class="card">🔧 Naprawa baterii</div>
<div class="card">🚿 Montaż</div>
<div class="card">🧰 Wymiana części</div>
<div class="card">💧 Geberit i Grohe</div>
</div>
</section>

<!-- OPINIE -->
<section>
<h2>Opinie klientów</h2>

<div class="reviews-box">

<!-- PRZYCISK DODANIA OPINII -->
<a href="https://www.facebook.com/profile.php?id=61570691483438&sk=reviews" target="_blank" class="fb-review-btn">
⭐ Dodaj opinię na Facebooku
</a>

<!-- FACEBOOK WIDGET -->
<div class="fb-page"
     data-href="https://www.facebook.com/profile.php?id=61570691483438"
     data-tabs="reviews"
     data-width="500"
     data-height="600"
     data-small-header="false"
     data-adapt-container-width="true"
     data-hide-cover="false"
     data-show-facepile="true">
</div>

</div>
</section>

<section>
<h2>Obszar działania</h2>
<iframe src="https://www.google.com/maps?q=Krakow&output=embed" width="100%" height="300"></iframe>
</section>

<section id="kontakt">
<h2>Kontakt</h2>
<form onsubmit="sendEmail(event)">
<input type="text" name="name" placeholder="Imię" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Wiadomość" required></textarea>
<button type="submit">Wyślij</button>
</form>
</section>

<!-- sticky -->
<a href="tel:+48660469203" id="sticky-call">📞</a>
<a href="#kontakt" id="sticky-contact">✉️</a>
<a href="http://www.springspa.pl" target="_blank" id="sticky-shop">🛒</a>
<a href="https://www.facebook.com/profile.php?id=61570691483438" target="_blank" id="sticky-fb">📘</a>

<footer style="text-align:center;padding:20px;">
© 2026 Serwis Hansgrohe Kraków
</footer>

<!-- FB SDK -->
<div id="fb-root"></div>
<script async defer crossorigin="anonymous"
src="https://connect.facebook.net/pl_PL/sdk.js#xfbml=1&version=v19.0">
</script>

<script>
function sendEmail(event){
event.preventDefault();
const f = event.target;
const body = encodeURIComponent(
`Imię: ${f.name.value}\nEmail: ${f.email.value}\n${f.message.value}`
);
window.location.href = `mailto:kontakt@serwis-hansgrohe.pl?body=${body}`;
}
</script>

</body>
</html>
